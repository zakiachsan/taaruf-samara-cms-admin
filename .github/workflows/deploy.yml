name: Build & Deploy to dist branch

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SKIP_TYPE_CHECK: true
          TSC_COMPILE_ON_ERROR: true

      - name: Deploy to dist branch
        env:
          GH_TOKEN: ${{ secrets.TAARUF_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/zakiachsan/taaruf-samara-cms-admin.git
          git checkout --orphan dist-temp
          git rm -rf --cached .
          cp -r dist/* .
          if [ -f dist/index.html ]; then cp dist/index.html .; fi
          touch .nojekyll
          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          git push -f origin dist-temp:dist
